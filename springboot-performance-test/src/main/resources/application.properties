spring.datasource.mysql.jdbc-url=jdbc:mariadb://localhost:3306/test_db
spring.datasource.mysql.username=root
spring.datasource.mysql.password=
spring.datasource.mysql.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.mysql.hikari.maximum-pool-size=20
spring.datasource.mysql.hikari.minimum-idle=5
spring.datasource.mysql.hikari.idle-timeout=300000
spring.datasource.mysql.hikari.connection-timeout=20000
spring.datasource.mysql.hikari.max-lifetime=1200000

spring.datasource.postgres.jdbc-url=jdbc:postgresql://localhost:5432/test_db
spring.datasource.postgres.username=postgres
spring.datasource.postgres.password=postgres
spring.datasource.postgres.driver-class-name=org.postgresql.Driver

spring.datasource.postgres.hikari.maximum-pool-size=20
spring.datasource.postgres.hikari.minimum-idle=5
spring.datasource.postgres.hikari.idle-timeout=300000
spring.datasource.postgres.hikari.connection-timeout=20000
spring.datasource.postgres.hikari.max-lifetime=1200000

server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.dbperformance=DEBUG
logging.level.com.example.dbperformance.cli=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/db-performance.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Keep web server running for optional dashboard access, but start in CLI mode
# If you want ONLY CLI, set: spring.main.web-application-type=none
